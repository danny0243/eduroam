ServerName eduroam.ncut.edu.tw:443
ServerTokens Prod
ServerSignature Off
TraceEnable Off

<VirtualHost *:80>
    ServerName eduroam.ncut.edu.tw
    Redirect permanent / https://eduroam.ncut.edu.tw/
</VirtualHost>

<VirtualHost *:443>
    ServerName eduroam.ncut.edu.tw
    ServerAdmin admin@ncut.edu.tw
    DocumentRoot /var/www/eduroam-portal/public

    SSLEngine on
    SSLCertificateFile /etc/pki/tls/certs/eduroam.ncut.edu.tw-fullchain.pem
    SSLCertificateKeyFile /etc/pki/tls/private/eduroam.ncut.edu.tw.key

    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set Referrer-Policy "same-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.gstatic.com https://apis.google.com; connect-src 'self' https://www.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com; img-src 'self' data: https://*.googleusercontent.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src https://accounts.google.com https://*.firebaseapp.com; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
    Header always set Permissions-Policy "camera=(), microphone=(), geolocation=()"
    Header always unset X-Powered-By

    <Directory /var/www/eduroam-portal>
        Options -Indexes
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/eduroam-portal/public>
        Options -Indexes +FollowSymLinks
        AllowOverride None
        Require all granted
        <FilesMatch "(?i)(\\.bak|\\.old|\\.orig|\\.save|~|\\.codex-backup-[A-Za-z0-9_-]+)$">
            Require all denied
        </FilesMatch>
    </Directory>

    ErrorLog /var/log/httpd/eduroam-portal-error.log
    CustomLog /var/log/httpd/eduroam-portal-access.log combined
</VirtualHost>
